<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add Employee</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <span class="navbar-brand">INFO-I Group 3</span>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/about">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/employees">Employees</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/managers">Managers</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/departments">Departments</a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link active"
                aria-current="page"
                href="/employees/add"
                >Add Employee</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/images/add">Add Image</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/images">Images</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
      <div class="row">
        <div class="col-md-12">
          <h2>Add Employee</h2>
          <br />

          <form method="post" action="/employees/add">
            <fieldset>
              <legend>Personal Information</legend>

              <div class="row mb-3">
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="firstName">First Name:</label>
                    <input
                      class="form-control"
                      id="firstName"
                      name="firstName"
                      type="text"
                    />
                  </div>
                </div>

                <div class="col-md-6">
                  <div class="form-group">
                    <label for="lastName">Last Name:</label>
                    <input
                      class="form-control"
                      id="lastName"
                      name="lastName"
                      type="text"
                    />
                  </div>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="email">Email:</label>
                    <input
                      class="form-control"
                      id="email"
                      name="email"
                      type="email"
                    />
                  </div>
                </div>

                <div class="col-md-6">
                  <div class="form-group">
                    <label for="SSN">Social Security Num:</label>
                    <input
                      class="form-control"
                      id="SSN"
                      name="SSN"
                      type="text"
                    />
                  </div>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-3">
                  <div class="form-group">
                    <label for="addressStreet">Address (Street):</label>
                    <input
                      class="form-control"
                      id="addressStreet"
                      name="addressStreet"
                      type="text"
                    />
                  </div>
                </div>

                <div class="col-md-3">
                  <div class="form-group">
                    <label for="addressCity">Address (City):</label>
                    <input
                      class="form-control"
                      id="addressCity"
                      name="addressCity"
                      type="text"
                    />
                  </div>
                </div>

                <div class="col-md-3">
                  <div class="form-group">
                    <label for="addressState">Address (State):</label>
                    <input
                      class="form-control"
                      id="addressState"
                      name="addressState"
                      type="text"
                    />
                  </div>
                </div>

                <div class="col-md-3">
                  <div class="form-group">
                    <label for="addressPostal">Address (Zip Code):</label>
                    <input
                      class="form-control"
                      id="addressPostal"
                      name="addressPostal"
                      type="text"
                    />
                  </div>
                </div>
              </div>
            </fieldset>

            <fieldset>
              <legend>Company Information</legend>

              <div class="row mb-3">
                <div class="col-md-3">
                  <label class="form-label">Manager:</label>
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      name="isManager"
                      id="isManager"
                    />
                    <label class="form-check-label" for="isManager">Yes</label>
                  </div>
                </div>

                <div class="col-md-3">
                  <div class="form-group">
                    <label for="employeeManagerNum"
                      >Employee's Manager Number:</label
                    >
                    <input
                      class="form-control"
                      id="employeeManagerNum"
                      name="employeeManagerNum"
                      type="text"
                    />
                  </div>
                </div>

                <div class="col-md-3">
                  <label class="form-label d-block">Status:</label>

                  <div class="mt-1">
                    <div class="form-check form-check-inline">
                      <input
                        class="form-check-input"
                        type="radio"
                        id="statusFT"
                        name="status"
                        value="Full Time"
                      />
                      <label class="form-check-label" for="statusFT"
                        >Full Time</label
                      >
                    </div>

                    <div class="form-check form-check-inline">
                      <input
                        class="form-check-input"
                        type="radio"
                        id="statusPT"
                        name="status"
                        value="Part Time"
                      />
                      <label class="form-check-label" for="statusPT"
                        >Part Time</label
                      >
                    </div>
                  </div>
                </div>

                <div class="col-md-3">
                  <div class="form-group">
                    <label for="department">Department</label>
                    <select
                      class="form-control"
                      name="department"
                      id="department"
                    >
                      <option value="1">Creative Services</option>
                      <option value="2">Product Development</option>
                      <option value="3">Marketing</option>
                      <option value="4">Strategic Planning</option>
                      <option value="5">Accounting</option>
                      <option value="6">Human Resources</option>
                      <option value="7">Quality Analysis</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-12">
                  <div class="form-group">
                    <label for="hireDate">Hire Date</label>
                    <input
                      class="form-control"
                      id="hireDate"
                      name="hireDate"
                      type="text"
                    />
                  </div>
                </div>
              </div>
            </fieldset>

            <hr />

            <input
              type="submit"
              class="btn btn-primary float-end"
              value="Add Employee"
            />
            <br /><br /><br />
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
